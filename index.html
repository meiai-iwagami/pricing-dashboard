// ============================================================
// SUPABASE CLIENT
// ============================================================
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ============================================================
// STATE
// ============================================================
let currentUser = null;
let userRole = null;

// ============================================================
// AUTH
// ============================================================
async function signIn() {
  const { error } = await sb.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: location.origin + location.pathname }
  });
  if (error) {
    document.getElementById('login-error').textContent = error.message;
    document.getElementById('login-error').classList.remove('hidden');
  }
}

async function signOut() {
  await sb.auth.signOut();
  location.reload();
}

async function checkAuth() {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) {
    show('login-screen');
    return;
  }
  currentUser = session.user;

  // Check whitelist access
  const { data: role } = await sb.rpc('check_user_access');
  if (!role) {
    document.getElementById('no-access-email').textContent = currentUser.email;
    show('no-access-screen');
    return;
  }
  userRole = role;
  document.getElementById('user-email').textContent = currentUser.email;
  show('app');
  initRouter();
}

function show(id) {
  ['login-screen', 'no-access-screen', 'app'].forEach(s => {
    document.getElementById(s).classList.toggle('hidden', s !== id);
  });
}

// ============================================================
// ROUTER
// ============================================================
const routes = {
  '/': pageDashboard,
  '/pricing': pagePricing,
  '/orders': pageOrders,
  '/products': pageProducts,
  '/skus': pageSkus,
  '/settings': pageSettings,
  '/logs': pageLogs,
};

function initRouter() {
  window.addEventListener('hashchange', handleRoute);
  handleRoute();
}

function handleRoute() {
  const hash = location.hash.replace('#', '') || '/';
  const page = routes[hash] || pageDashboard;

  // Update sidebar active state
  document.querySelectorAll('.sidebar-link').forEach(el => {
    el.classList.toggle('active', el.dataset.page === hash);
  });

  const content = document.getElementById('content');
  content.innerHTML = '<div class="flex justify-center py-20"><div class="loader"></div></div>';
  page(content);
}

// ============================================================

function yen(n) {
  if (n == null) return '—';
  return '¥' + Number(n).toLocaleString();
}

function num(n) {
  if (n == null) return '—';
  return Number(n).toLocaleString();
}

function pct(n) {
  if (n == null) return '—';
  return (Number(n) * 100).toFixed(1) + '%';
}

function fmtDate(d) {
  if (!d) return '—';
  const dt = new Date(d);
  const y = String(dt.getFullYear()).slice(2);
  const m = String(dt.getMonth() + 1).padStart(2, '0');
  const day = String(dt.getDate()).padStart(2, '0');
  const h = String(dt.getHours()).padStart(2, '0');
  const min = String(dt.getMinutes()).padStart(2, '0');
  return `${y}/${m}/${day} ${h}:${min}`;
}

function fmtDateShort(d) {
  if (!d) return '—';
  const dt = new Date(d);
  return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
}

function escHtml(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function toast(msg, type = 'success') {
  const bg = type === 'success' ? 'bg-emerald-600' : type === 'error' ? 'bg-red-600' : 'bg-blue-600';
  const el = document.createElement('div');
  el.className = `toast ${bg}`;
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

function sortIndicator(currentSort, currentDir, col) {
  if (currentSort !== col) return '';
  return currentDir === 'asc' ? ' ↑' : ' ↓';
}

function truncate(s, len = 30) {
  if (!s) return '—';
  return s.length > len ? s.slice(0, len) + '...' : s;
}

// Clean product name: remove maker prefix and trailing N個入
function cleanProductName(name, maker) {
  if (!name) return '—';
  let s = name;
  if (maker && s.startsWith(maker)) s = s.slice(maker.length).trim();
  s = s.replace(/\s*\d+個入\s*$/, '');
  return s || name;
}

// ============================================================
// PRICING HELPERS
// ============================================================
const UNIT_ORDER = { bx: 0, vr: 1, cp: 2, as: 3, tp: 4 };
const UNIT_LABELS = { bx: 'BOX', vr: 'バラ', cp: 'コンプ', as: 'アソート', tp: 'トッピング' };
const UNIT_BADGE = { bx: 'badge-amber', vr: 'badge-blue', cp: 'badge-green', as: 'badge-purple', tp: 'badge-gray' };

function makerToHue(maker) {
  if (!maker) return 0;
  let h = 0;
  for (let i = 0; i < maker.length; i++) h = maker.charCodeAt(i) + ((h << 5) - h);
  return ((h % 360) + 360) % 360;
}

function calcBoxInventory(skus, yieldOv) {
  let bxStock = 0, vrStock = 0, cpEq = 0, asEq = 0, tpEq = 0, bxYield = 0, vrYield = 0;
  for (const s of skus) {
    const qty = s.stock_quantity ?? 0;
    const yld = yieldOv[s.sku_code] ?? s.yield_per_box ?? 0;
    switch (s.sale_unit) {
      case 'bx': bxStock = qty; bxYield = yld; break;
      case 'vr': vrStock = qty; vrYield = yld; break;
      case 'cp': cpEq += yld > 0 ? qty / yld : 0; break;
      case 'as': asEq += yld > 0 ? qty / yld : 0; break;
      case 'tp': tpEq += yld > 0 ? qty / yld : 0; break;
    }
  }
  const boxEq = bxStock + (vrYield > 0 ? vrStock / vrYield : 0);
  const setEq = cpEq + asEq + tpEq;
  return { bxStock, vrStock, boxEq, setEq, totalEq: boxEq + setEq };
}

function resolveSellerFlag(sid, jan, asin, sMap, jOvMap, aOvMap) {
  const ak = sid + ':' + asin;
  if (aOvMap[ak]) return { flag: aOvMap[ak].flag, scope: 'A' };
  const jk = sid + ':' + jan;
  if (jOvMap[jk]) return { flag: jOvMap[jk].flag, scope: 'J' };
  const sm = sMap[sid];
  if (sm?.default_flag) return { flag: sm.default_flag, scope: 'G' };
  return null;
}

function fmtShort(d) {
  if (!d) return '—';
  const dt = new Date(d);
  return `${dt.getMonth()+1}/${dt.getDate()} ${String(dt.getHours()).padStart(2,'0')}:${String(dt.getMinutes()).padStart(2,'0')}`;
}

// PAGE: PRICING
// ============================================================
async function pagePricing(el) {
  el.innerHTML = '<div class="flex justify-center py-20"><div class="loader"></div></div>';

  const [skuRes, compRes, settRes, sellerRes, janOvRes, asinOvRes, keepaRes, rankRes, salesRes] = await Promise.all([
    sb.from('sku_product_view').select('*'),
    sb.from('competitor_offers').select('*'),
    sb.from('settings').select('*'),
    sb.from('seller_master').select('*'),
    sb.from('seller_jan_overrides').select('*'),
    sb.from('seller_asin_overrides').select('*'),
    sb.from('keepa_product_data').select('*'),
    sb.from('product_rankings').select('*'),
    sb.from('order_details_flat').select('jan_cd, amount, amount_price, order_date, shop_code').gte('order_date', new Date(Date.now() - 30 * 86400000).toISOString()).neq('cancel_flag', '1'),
  ]);

  const allSkus = skuRes.data || [];
  const offers = compRes.data || [];
  const settingsArr = settRes.data || [];
  const sellers = sellerRes.data || [];
  const janOvArr = janOvRes.data || [];
  const asinOvArr = asinOvRes.data || [];
  const keepaArr = keepaRes.data || [];
  const rankings = rankRes.data || [];
  const salesData = salesRes.data || [];

  // Lookup maps
  const settingsMap = {};
  settingsArr.forEach(s => settingsMap[s.key] = s.value);
  const ownSellerId = settingsMap.own_seller_id ? String(settingsMap.own_seller_id).replace(/"/g, '') : '';
  const keepaApiKey = settingsMap.keepa_api_key ? String(settingsMap.keepa_api_key).replace(/"/g, '') : '';
  const offersByAsin = {};
  offers.forEach(o => { (offersByAsin[o.asin] = offersByAsin[o.asin] || []).push(o); });
  const keepaByAsin = {};
  keepaArr.forEach(k => keepaByAsin[k.asin] = k);
  const sellerMap = {};
  sellers.forEach(s => sellerMap[s.seller_id] = s);
  const janOvMap = {};
  janOvArr.forEach(o => janOvMap[o.seller_id + ':' + o.jan_code] = o);
  const asinOvMap = {};
  asinOvArr.forEach(o => asinOvMap[o.seller_id + ':' + o.asin] = o);
  const rankByAsin = {};
  rankings.forEach(r => { (rankByAsin[r.asin] = rankByAsin[r.asin] || []).push(r); });

  // Mall-based sales from order_details_flat
  const salesByJanMall = {};
  salesData.forEach(r => {
    const jan = r.jan_cd; if (!jan) return;
    const sc = String(r.shop_code || '').padStart(2, '0');
    if (!salesByJanMall[jan]) salesByJanMall[jan] = {};
    if (!salesByJanMall[jan][sc]) salesByJanMall[jan][sc] = { qty: 0, revenue: 0 };
    salesByJanMall[jan][sc].qty += Number(r.amount) || 0;
    salesByJanMall[jan][sc].revenue += Number(r.amount_price) || 0;
  });

  // Override state (local edits)
  const levelOv = {}, yieldOv = {}, priceOv = {}, multOv = {};

  // Filter state
  let search = '', filterMaker = '', filterLevel = '', filterPool = '', filterMonth = '', showInactive = false;

  // Expand state: block columns and JAN rows
  const blockExp = { common: true, amazon: true, rakuten: false, yahoo: false };
  const expJan = new Set();

  function getFiltered() {
    let r = allSkus;
    if (!showInactive) r = r.filter(s => s.is_active);
    if (filterLevel) r = r.filter(s => (levelOv[s.sku_code] || s.pricing_level) === filterLevel);
    if (filterPool) r = r.filter(s => s.inventory_pool === filterPool);
    if (filterMaker) r = r.filter(s => s.maker === filterMaker);
    if (filterMonth) {
      r = r.filter(s => {
        const m = s.release_date ? s.release_date.slice(0, 7) : '未定';
        return m === filterMonth;
      });
    }
    if (search) {
      const q = search.toLowerCase();
      r = r.filter(s =>
        (s.sku_code || '').toLowerCase().includes(q) ||
        (s.jan_code || '').toLowerCase().includes(q) ||
        (s.product_name || '').toLowerCase().includes(q) ||
        (s.p_product_name || '').toLowerCase().includes(q) ||
        (s.asin || '').toLowerCase().includes(q)
      );
    }
    return r;
  }

  function getVisibleFields(bk) {
    const block = FIELD_DEFS[bk];
    if (!block) return [];
    return blockExp[bk] ? block.fields : block.fields.filter(f => f.visible);
  }

  function getAllVisibleFields() {
    const result = [];
    for (const bk of ['common', 'amazon', 'rakuten', 'yahoo']) {
      for (const f of getVisibleFields(bk)) result.push({ ...f, block: bk });
    }
    return result;
  }

  function lowestForAsin(asin) {
    let low = Infinity;
    for (const o of (offersByAsin[asin] || [])) {
      if (o.seller_id !== ownSellerId && o.price > 0 && o.price < low) low = o.price;
    }
    return low === Infinity ? null : low;
  }

  // Cell HTML renderer
  function cellHtml(field, sku, ctx) {
    const al = field.align || 'left';
    let extra = '', content = '';

    switch (field.key) {
      case 'product_name': {
        if (ctx.isJan) {
          content = escHtml(cleanProductName(sku.p_product_name, sku.maker));
        } else {
          const unit = UNIT_LABELS[sku.sale_unit] || sku.sale_unit;
          let nm = sku.product_name ? sku.product_name.replace(/^.*?(【[^】]+】)/, '$1') : '';
          if (!nm.includes('【')) nm = '【' + unit + '】';
          content = escHtml(nm);
        }
        break;
      }
      case 'stock_quantity':
        content = ctx.isJan ? num(ctx.totalStock) : num(sku.stock_quantity); break;
      case 'unit_price':
        content = sku.p_unit_price ? yen(sku.p_unit_price) : '—'; break;
      case 'maker':
        content = escHtml(sku.maker || '—'); break;
      case 'cost_price':
        content = sku.cost_price_tax_incl ? yen(sku.cost_price_tax_incl) : '—'; break;
      case 'wholesale_rate':
        content = sku.p_wholesale_rate ? (sku.p_wholesale_rate * 100).toFixed(0) + '%' : '—'; break;
      case 'release_date':
        content = sku.release_date ? fmtDateShort(sku.release_date) : '—'; break;
      case 'inventory_pool':
        content = sku.inventory_pool || '—'; break;
      case 'amz_price': {
        const p = priceOv[sku.sku_code] ?? sku.current_price;
        if (ctx.isJan) {
          const bx = ctx.janSkus.find(s => s.sale_unit === 'bx');
          content = bx ? yen(priceOv[bx.sku_code] ?? bx.current_price) : '—';
        } else if (sku.sale_unit === 'bx') {
          content = `<input type="number" class="inline-inp" data-action="price" data-sku="${escHtml(sku.sku_code)}" data-unit="bx" value="${p||''}">`;
        } else {
          content = yen(p);
        }
        break;
      }
      case 'amz_level': {
        const lv = levelOv[sku.sku_code] || sku.pricing_level;
        if (ctx.isJan) {
          const bx = ctx.janSkus.find(s => s.sale_unit === 'bx');
          const blv = bx ? (levelOv[bx.sku_code] || bx.pricing_level) : null;
          content = blv ? `<span class="badge ${LEVEL_COLORS[blv]||'badge-gray'} text-xs">${escHtml(blv)}</span>` : '—';
        } else {
          content = `<select class="inline-sel" data-action="level" data-sku="${escHtml(sku.sku_code)}">${LEVEL_OPTIONS.map(l => `<option value="${l}" ${lv===l?'selected':''}>${l}</option>`).join('')}</select>`;
        }
        break;
      }
      case 'amz_lowest': {
        const low = ctx.lowestPrice;
        if (low != null) {
          content = yen(low);
          const p = priceOv[sku.sku_code] ?? sku.current_price;
          if (p && low < p) extra = ' text-red';
          else if (p && low > p) extra = ' text-green';
        } else content = '—';
        break;
      }
      case 'amz_sellers': {
        const cnt = (offersByAsin[ctx.asin] || []).length;
        content = cnt > 0 ? String(cnt) : '—'; break;
      }
      case 'amz_sales_30d': {
        const m = salesByJanMall[sku.jan_code] || {};
        content = String((m['02'] || { qty: 0 }).qty); break;
      }
      case 'asin':
        content = escHtml(sku.asin || '—'); extra = ' font-mono'; break;
      case 'amz_calc_price': {
        if (ctx.isJan) { content = '—'; break; }
        content = yen(sku.calculated_price); break;
      }
      case 'amz_diff': {
        if (ctx.isJan) { content = '—'; break; }
        const p = priceOv[sku.sku_code] ?? sku.current_price;
        const c = sku.calculated_price;
        if (p && c) {
          const d = c - p;
          content = (d > 0 ? '+' : '') + num(d);
          extra = d > 0 ? ' text-green' : d < 0 ? ' text-red' : '';
        } else content = '—';
        break;
      }
      case 'amz_profit': {
        if (ctx.isJan) { content = '—'; break; }
        const p = priceOv[sku.sku_code] ?? sku.current_price;
        const cost = sku.cost_price_tax_incl;
        if (p && cost) {
          const gp = p - cost;
          const gr = p > 0 ? (p - cost) / p : 0;
          content = yen(gp) + ' (' + (gr * 100).toFixed(1) + '%)';
          extra = gp < 0 ? ' text-red' : '';
        } else content = '—';
        break;
      }
      case 'amz_multiplier': {
        if (ctx.isJan) { content = '—'; break; }
        const m = multOv[sku.sku_code] ?? sku.price_multiplier;
        const hasBx = ctx.janSkus.some(x => x.sale_unit === 'bx');
        if (sku.sale_unit !== 'bx' && hasBx) {
          content = `<input type="number" step="0.01" class="inline-inp" style="width:55px" data-action="mult" data-sku="${escHtml(sku.sku_code)}" value="${m||''}">`;
        } else {
          content = m ? m.toFixed(2) : '—';
        }
        break;
      }
      case 'amz_yield': {
        if (ctx.isJan) { content = '—'; break; }
        const y = yieldOv[sku.sku_code] ?? sku.yield_per_box;
        if (['cp','as','tp'].includes(sku.sale_unit)) {
          content = `<input type="number" min="1" class="inline-inp" style="width:50px" data-action="yield" data-sku="${escHtml(sku.sku_code)}" value="${y||''}">`;
        } else {
          content = y != null ? String(y) : '—';
        }
        break;
      }
      case 'amz_keepa_new': {
        const kd = keepaByAsin[ctx.asin];
        content = kd?.current_new_price ? yen(kd.current_new_price) : '—'; break;
      }
      case 'amz_bb_price': {
        const kd = keepaByAsin[ctx.asin];
        content = kd?.current_buy_box_price ? yen(kd.current_buy_box_price) : '—'; break;
      }
      case 'amz_ranking': {
        const ranks = rankByAsin[ctx.asin] || [];
        if (ranks.length > 0) {
          const best = ranks.sort((a, b) => (a.rank || Infinity) - (b.rank || Infinity))[0];
          content = best.rank ? '#' + num(best.rank) : '—';
        } else content = '—';
        break;
      }
      case 'amz_keepa_graph': {
        if (ctx.asin && keepaApiKey) {
          content = `<img src="https://graph.keepa.com/pricehistory.png?asin=${escHtml(ctx.asin)}&amp;domain=5&amp;range=180&amp;width=600&amp;height=180&amp;key=${escHtml(keepaApiKey)}" alt="Keepa" loading="lazy" style="max-width:300px;height:auto">`;
        } else content = '—';
        break;
      }
      case 'rk_sales_30d': {
        const m = salesByJanMall[sku.jan_code] || {};
        content = String((m['01'] || { qty: 0 }).qty); break;
      }
      case 'rk_revenue_30d': {
        const m = salesByJanMall[sku.jan_code] || {};
        content = yen((m['01'] || { revenue: 0 }).revenue); break;
      }
      case 'yh_sales_30d': {
        const m = salesByJanMall[sku.jan_code] || {};
        content = String((m['03'] || { qty: 0 }).qty); break;
      }
      case 'yh_revenue_30d': {
        const m = salesByJanMall[sku.jan_code] || {};
        content = yen((m['03'] || { revenue: 0 }).revenue); break;
      }
      default: content = '—';
    }
    return `<td style="text-align:${al}" class="${extra}">${content}</td>`;
  }

  function render() {
    const filtered = getFiltered();
    const allMonths = [...new Set(allSkus.map(s => s.release_date ? s.release_date.slice(0, 7) : '未定'))].sort((a, b) => {
      if (a === '未定') return 1; if (b === '未定') return -1; return b.localeCompare(a);
    });
    const allMakers = [...new Set(allSkus.map(s => s.maker).filter(Boolean))].sort();

    // Group by JAN
    const janMap = {};
    filtered.forEach(s => { (janMap[s.jan_code || 'unknown'] = janMap[s.jan_code || 'unknown'] || []).push(s); });
    for (const jan in janMap) janMap[jan].sort((a, b) => (UNIT_ORDER[a.sale_unit] ?? 9) - (UNIT_ORDER[b.sale_unit] ?? 9));
    const sortedJans = Object.keys(janMap).sort();
    const visibleFields = getAllVisibleFields();

    let html = `
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-lg font-bold">プライシング</h2>
        <span class="text-sm text-gray-500">JAN: ${sortedJans.length} / SKU: ${filtered.length}</span>
      </div>
      <div class="flex flex-wrap gap-2 mb-4">
        <input type="text" class="input w-56" placeholder="検索（商品名・JAN・SKU・ASIN）" value="${escHtml(search)}" id="pf-search">
        <select class="input" id="pf-maker"><option value="">全メーカー</option>${allMakers.map(m => `<option value="${escHtml(m)}" ${filterMaker===m?'selected':''}>${escHtml(m)}</option>`).join('')}</select>
        <select class="input" id="pf-level"><option value="">全レベル</option>${LEVEL_OPTIONS.map(l => `<option value="${l}" ${filterLevel===l?'selected':''}>${l}</option>`).join('')}</select>
        <select class="input" id="pf-pool"><option value="">全プール</option><option value="box" ${filterPool==='box'?'selected':''}>BOX</option><option value="set" ${filterPool==='set'?'selected':''}>SET</option></select>
        <select class="input" id="pf-month"><option value="">全月</option>${allMonths.map(m => `<option value="${m}" ${filterMonth===m?'selected':''}>${m === '未定' ? '未定' : m.replace(/^(\d{4})-(\d{1,2})$/, (_, y, mo) => y+'年'+parseInt(mo)+'月')}</option>`).join('')}</select>
        <label class="flex items-center gap-1 text-sm text-gray-600"><input type="checkbox" id="pf-inactive" ${showInactive?'checked':''}>非アクティブ</label>
      </div>
    `;

    // Table
    html += '<div class="pricing-wrap"><table class="pricing-table">';

    // Header row 1: block headers
    html += '<thead><tr>';
    html += '<th class="sticky-col" style="min-width:120px">JAN / SKU</th>';
    for (const bk of ['common','amazon','rakuten','yahoo']) {
      const block = FIELD_DEFS[bk];
      const fields = getVisibleFields(bk);
      const expanded = blockExp[bk];
      const hiddenCount = block.fields.length - block.fields.filter(f => f.visible).length;
      html += `<th colspan="${fields.length}" class="block-hdr" data-block="${bk}" style="background:${block.color}11; color:${block.color}; border-bottom: 2px solid ${block.color}">`;
      html += `<span class="arr ${expanded?'open':''}">&#9654;</span>${block.label}`;
      if (hiddenCount > 0 && !expanded) html += ` <span style="font-weight:400;font-size:10px">(+${hiddenCount})</span>`;
      html += '</th>';
    }
    html += '</tr>';

    // Header row 2: field labels
    html += '<tr><th class="sticky-col" style="background:#f9fafb"></th>';
    for (const f of visibleFields) {
      const block = FIELD_DEFS[f.block];
      html += `<th style="background:${block.color}06; font-size:11px; font-weight:500; text-align:${f.align||'left'}">${f.label}</th>`;
    }
    html += '</tr></thead>';

    // Body
    html += '<tbody>';
    if (sortedJans.length === 0) {
      html += `<tr><td colspan="${1+visibleFields.length}" style="text-align:center;padding:2rem;color:#6b7280">該当するSKUがありません</td></tr>`;
    }
    for (const jan of sortedJans) {
      const janSkus = janMap[jan];
      const expanded = expJan.has(jan);
      const boxSku = janSkus.find(s => s.sale_unit === 'bx');
      const primaryAsin = (boxSku?.asin) || (janSkus.find(s => s.asin)?.asin) || '';
      let totalStock = 0;
      janSkus.forEach(s => totalStock += (s.stock_quantity ?? 0));
      const lowestPrice = lowestForAsin(primaryAsin);

      // JAN row
      html += `<tr class="jan-tr" data-jan="${escHtml(jan)}">`;
      html += `<td class="sticky-col" style="background:#f1f5f9"><span class="arr ${expanded?'open':''}">&#9654;</span> <span class="font-mono text-xs">${escHtml(jan)}</span></td>`;
      const ctx = { isJan: true, janSkus, totalStock, lowestPrice, asin: primaryAsin };
      const rep = boxSku || janSkus[0];
      for (const f of visibleFields) html += cellHtml(f, rep, ctx);
      html += '</tr>';

      // SKU rows
      for (const sku of janSkus) {
        const isBox = sku.sale_unit === 'bx';
        const skuCtx = { isJan: false, janSkus, totalStock, lowestPrice: lowestForAsin(sku.asin || ''), asin: sku.asin || '' };
        html += `<tr class="sku-tr ${isBox?'bx-row':''} ${expanded?'':'hidden-row'}" data-jan-child="${escHtml(jan)}">`;
        html += `<td class="sticky-col font-mono text-xs" style="padding-left:24px;background:${isBox?'rgba(251,191,36,0.06)':'#fff'}">${escHtml(sku.sku_code)} <span class="badge ${UNIT_BADGE[sku.sale_unit]||'badge-gray'}" style="font-size:10px">${escHtml(UNIT_LABELS[sku.sale_unit]||sku.sale_unit)}</span></td>`;
        for (const f of visibleFields) html += cellHtml(f, sku, skuCtx);
        html += '</tr>';
      }

      // Detail row (competitor table + keepa graph) when expanded and Amazon block expanded
      if (expanded && blockExp.amazon && primaryAsin) {
        const aOffers = offersByAsin[primaryAsin] || [];
        if (aOffers.length > 0 || keepaApiKey) {
          const totalCols = 1 + visibleFields.length;
          html += `<tr class="detail-tr" data-jan-child="${escHtml(jan)}"><td colspan="${totalCols}"><div class="detail-flex">`;

          if (aOffers.length > 0) {
            const sorted = [...aOffers].sort((a, b) => {
              if (a.seller_id === ownSellerId) return -1;
              if (b.seller_id === ownSellerId) return 1;
              return (a.price || 0) - (b.price || 0);
            });
            const lowestNonOwn = sorted.filter(o => o.seller_id !== ownSellerId && o.price > 0).map(o => o.price).sort((a,b) => a-b)[0];
            html += '<div><table class="comp-tbl"><thead><tr><th>セラー</th><th>価格</th><th>FBA</th><th>BB</th><th>状態</th><th>操作</th></tr></thead><tbody>';
            for (const o of sorted) {
              const isOwn = o.seller_id === ownSellerId;
              const fl = resolveSellerFlag(o.seller_id, jan, primaryAsin, sellerMap, janOvMap, asinOvMap);
              const exc = fl?.flag === 'exclude';
              const foc = fl?.flag === 'focus';
              const isLow = o.price === lowestNonOwn && !isOwn;
              const dn = sellerMap[o.seller_id]?.display_name || o.seller_name || (o.seller_id?.slice(0,8)+'...');
              html += `<tr class="${isOwn?'own':''} ${isLow&&!isOwn?'low':''}">`;
              html += `<td style="max-width:200px;overflow:hidden;text-overflow:ellipsis">${escHtml(dn)}${isOwn?' <span style="color:#2563eb">(自社)</span>':''}</td>`;
              html += `<td style="text-align:right;font-family:monospace">${yen(o.price)}</td>`;
              html += `<td>${o.is_fba?'FBA':''}</td><td>${o.is_buy_box?'BB':''}</td>`;
              html += `<td>${fl?`<span class="badge ${exc?'badge-red':'badge-blue'}" style="font-size:10px">${exc?'除外':'注目'}(${fl.scope})</span>`:''}</td>`;
              html += '<td>';
              if (!isOwn) {
                if (!exc) html += `<button class="btn btn-secondary text-xs" style="padding:1px 6px" data-action="flag" data-seller="${escHtml(o.seller_id)}" data-jan="${escHtml(jan)}" data-asin="${escHtml(primaryAsin)}" data-flag="exclude">除外</button> `;
                if (!foc) html += `<button class="btn btn-secondary text-xs" style="padding:1px 6px" data-action="flag" data-seller="${escHtml(o.seller_id)}" data-jan="${escHtml(jan)}" data-asin="${escHtml(primaryAsin)}" data-flag="focus">注目</button> `;
                if (fl && fl.scope !== 'G') html += `<button class="btn btn-secondary text-xs" style="padding:1px 6px" data-action="flag-clear" data-seller="${escHtml(o.seller_id)}" data-jan="${escHtml(jan)}" data-asin="${escHtml(primaryAsin)}" data-scope="${fl.scope}">解除</button>`;
              }
              html += '</td></tr>';
            }
            html += '</tbody></table></div>';
          }

          if (keepaApiKey && primaryAsin) {
            html += `<div class="keepa-img"><img src="https://graph.keepa.com/pricehistory.png?asin=${escHtml(primaryAsin)}&amp;domain=5&amp;range=180&amp;width=600&amp;height=180&amp;key=${escHtml(keepaApiKey)}" alt="Keepa" loading="lazy"></div>`;
          }

          html += '</div></td></tr>';
        }
      }
    }
    html += '</tbody></table></div>';

    el.innerHTML = html;
    bindEvents();
  }

  function bindEvents() {
    // Filters
    document.getElementById('pf-search')?.addEventListener('input', debounce(e => { search = e.target.value; render(); }, 300));
    document.getElementById('pf-maker')?.addEventListener('change', e => { filterMaker = e.target.value; render(); });
    document.getElementById('pf-level')?.addEventListener('change', e => { filterLevel = e.target.value; render(); });
    document.getElementById('pf-pool')?.addEventListener('change', e => { filterPool = e.target.value; render(); });
    document.getElementById('pf-month')?.addEventListener('change', e => { filterMonth = e.target.value; render(); });
    document.getElementById('pf-inactive')?.addEventListener('change', e => { showInactive = e.target.checked; render(); });

    // Block header clicks (horizontal accordion)
    el.querySelectorAll('.block-hdr').forEach(th => {
      th.addEventListener('click', () => {
        const bk = th.dataset.block;
        blockExp[bk] = !blockExp[bk];
        render();
      });
    });

    // JAN row clicks (vertical accordion)
    el.querySelectorAll('.jan-tr').forEach(tr => {
      tr.addEventListener('click', (e) => {
        if (e.target.tagName === 'SELECT' || e.target.tagName === 'INPUT' || e.target.tagName === 'OPTION') return;
        const j = tr.dataset.jan;
        if (expJan.has(j)) expJan.delete(j); else expJan.add(j);
        render();
      });
    });

    // Event delegation for inline editing and seller flags
    el.addEventListener('change', async (e) => {
      const t = e.target;
      const action = t.dataset?.action;
      const sku = t.dataset?.sku;
      if (!action || !sku) return;

      if (action === 'price') {
        const val = t.value ? parseInt(t.value) : null;
        if (!val || val <= 0) return;
        priceOv[sku] = val;
        const { error } = await sb.from('product_skus').update({ current_price: val }).eq('sku_code', sku);
        if (error) toast('保存失敗: ' + error.message, 'error');
        else {
          toast('価格更新: ' + yen(val));
          const s = allSkus.find(x => x.sku_code === sku); if (s) s.current_price = val;
          // Cascade to linked SKUs if BOX
          if (t.dataset.unit === 'bx') {
            const linked = allSkus.filter(x => x.jan_code === s?.jan_code && x.sku_code !== sku && x.pricing_level === 'OFF' && x.price_multiplier != null);
            for (const lk of linked) {
              const np = Math.floor((val * lk.price_multiplier - 80) / 100) * 100 + 80;
              priceOv[lk.sku_code] = np; lk.current_price = np;
              await sb.from('product_skus').update({ current_price: np }).eq('sku_code', lk.sku_code);
            }
            render();
          }
        }
      } else if (action === 'level') {
        levelOv[sku] = t.value;
        const { error } = await sb.from('product_skus').update({ pricing_level: t.value }).eq('sku_code', sku);
        if (error) toast('保存失敗: ' + error.message, 'error');
        else { toast('レベル変更: ' + t.value); const s = allSkus.find(x => x.sku_code === sku); if (s) s.pricing_level = t.value; }
      } else if (action === 'mult') {
        const val = t.value ? parseFloat(t.value) : null;
        if (!val || val <= 0) return;
        multOv[sku] = val;
        const { error } = await sb.from('product_skus').update({ price_multiplier: val }).eq('sku_code', sku);
        if (error) toast('保存失敗: ' + error.message, 'error');
        else { toast('倍率更新: ' + val.toFixed(2)); const s = allSkus.find(x => x.sku_code === sku); if (s) s.price_multiplier = val; }
      } else if (action === 'yield') {
        const val = t.value ? parseInt(t.value) : null;
        if (!val || val < 1) return;
        yieldOv[sku] = val;
        const { error } = await sb.from('product_skus').update({ yield_per_box: val }).eq('sku_code', sku);
        if (error) toast('保存失敗: ' + error.message, 'error');
        else { toast('収量更新: ' + val); const s = allSkus.find(x => x.sku_code === sku); if (s) s.yield_per_box = val; render(); }
      }
    });

    // Seller flag buttons (event delegation)
    el.addEventListener('click', async (e) => {
      const btn = e.target.closest('[data-action="flag"]');
      if (btn) {
        const { seller, jan, flag } = btn.dataset;
        const { error } = await sb.from('seller_jan_overrides').upsert({ seller_id: seller, jan_code: jan, flag }, { onConflict: 'seller_id,jan_code' });
        if (error) toast('設定失敗: ' + error.message, 'error');
        else { toast(`${flag==='exclude'?'除外':'注目'}に設定`); janOvMap[seller+':'+jan] = { seller_id: seller, jan_code: jan, flag }; render(); }
        return;
      }
      const clr = e.target.closest('[data-action="flag-clear"]');
      if (clr) {
        const { seller, jan, asin, scope } = clr.dataset;
        if (scope === 'J') {
          const { error } = await sb.from('seller_jan_overrides').delete().eq('seller_id', seller).eq('jan_code', jan);
          if (error) toast('解除失敗: ' + error.message, 'error');
          else { toast('フラグ解除'); delete janOvMap[seller+':'+jan]; render(); }
        } else if (scope === 'A') {
          const { error } = await sb.from('seller_asin_overrides').delete().eq('seller_id', seller).eq('asin', asin);
          if (error) toast('解除失敗: ' + error.message, 'error');
          else { toast('フラグ解除'); delete asinOvMap[seller+':'+asin]; render(); }
        }
      }
    });

    // Prevent JAN toggle when interacting with inputs/selects
    el.addEventListener('click', (e) => {
      if (e.target.dataset?.action) e.stopPropagation();
    }, true);
  }

  render();
}

// ============================================================
// PAGE: ORDERS
// ============================================================
async function pageOrders(el) {
  // State
  let shops = ['01','02','03'];
  let dateFrom = '';
  let dateTo = '';
  let search = '';
  let reservationOnly = false;
  let page = 1;
  let limit = 50;
  let sortCol = 'order_date';
  let sortDir = 'desc';
  let reservationPhaseNames = [];

  // Load reservation phase names from settings
  const { data: settingsData } = await sb.from('settings').select('value').eq('key', 'reservation_phase_names').single();
  if (settingsData?.value) {
    try { reservationPhaseNames = Array.isArray(settingsData.value) ? settingsData.value : JSON.parse(settingsData.value); } catch {}
  }

  async function loadAndRender() {
    el.querySelector('#orders-body')?.closest('.card')?.classList.add('opacity-50');

    let query = sb.from('order_details_flat')
      .select('*', { count: 'exact' })
      .neq('cancel_flag', '1');

    if (shops.length > 0 && shops.length < 3) {
      const shopVariants = shops.flatMap(s => [s, s.replace(/^0/, '')]);
      query = query.in('shop_code', [...new Set(shopVariants)]);
    }
    if (dateFrom) query = query.gte('order_date', dateFrom + 'T00:00:00');
    if (dateTo) query = query.lte('order_date', dateTo + 'T23:59:59');
    if (search) {
      const s = search.replace(/[.,()"'\\]/g, '');
      if (s) query = query.or(`item_code.ilike.%${s}%,item_name.ilike.%${s}%,jan_cd.ilike.%${s}%`);
    }

    query = query.order(sortCol, { ascending: sortDir === 'asc' });
    const from = (page - 1) * limit;
    query = query.range(from, from + limit - 1);

    const { data: rows, count, error } = await query;
    if (error) { toast('データ取得エラー: ' + error.message, 'error'); return; }

    const totalCount = count || 0;
    const processedRows = (rows || []).map(r => ({
      ...r,
      is_reservation: r.reserve_type === '1' || (reservationPhaseNames.includes(r.phase_name))
    }));
    const filteredRows = reservationOnly ? processedRows.filter(r => r.is_reservation) : processedRows;

    // Unique order numbers
    const uniqueOrders = new Set(filteredRows.map(r => r.order_number)).size;
    const pageTotal = filteredRows.reduce((s, r) => s + (Number(r.amount_price) || 0), 0);
    const totalPages = Math.ceil(totalCount / limit);

    renderOrders(filteredRows, totalCount, uniqueOrders, pageTotal, totalPages);
  }

  function renderOrders(rows, totalCount, uniqueOrders, pageTotal, totalPages) {
    const summaryHtml = `
      <div class="grid grid-cols-3 gap-4 mb-4">
        <div class="card"><div class="text-xs text-gray-500">注文件数</div><div class="text-xl font-bold">${num(uniqueOrders)}</div></div>
        <div class="card"><div class="text-xs text-gray-500">明細件数</div><div class="text-xl font-bold">${num(totalCount)}</div></div>
        <div class="card"><div class="text-xs text-gray-500">合計金額（表示分）</div><div class="text-xl font-bold">${yen(pageTotal)}</div></div>
      </div>
    `;

    const filtersHtml = `
      <div class="flex flex-wrap gap-2 mb-4 items-center">
        <div class="flex gap-1">
          ${Object.entries(SHOP_MAP).map(([code, name]) => `
            <button class="btn text-xs shop-toggle ${shops.includes(code) ? 'btn-primary' : 'btn-secondary'}" data-shop="${code}">${name}</button>
          `).join('')}
        </div>
        <input type="date" class="input text-xs" id="order-date-from" value="${dateFrom}">
        <span class="text-gray-400 text-xs">〜</span>
        <input type="date" class="input text-xs" id="order-date-to" value="${dateTo}">
        <input type="text" class="input text-xs w-40" placeholder="検索..." id="order-search" value="${escHtml(search)}">
        <label class="flex items-center gap-1 text-xs text-gray-600">
          <input type="checkbox" id="order-reserve" ${reservationOnly?'checked':''}>予約のみ
        </label>
        <select class="input text-xs" id="order-limit">
          ${[50,100,200].map(n => `<option value="${n}" ${limit===n?'selected':''}>${n}件</option>`).join('')}
        </select>
      </div>
    `;

    const thSort = (col, label) =>
      `<th data-sort="${col}" class="${['amount','unit_price','amount_price'].includes(col)?'text-right':''}">${label}${sortIndicator(sortCol,sortDir,col)}</th>`;

    const tableHtml = `
      <div class="card overflow-x-auto">
        <table class="data-table" id="orders-table">
          <thead><tr>
            ${thSort('order_date','注文日')}
            ${thSort('shop_code','ショップ')}
            ${thSort('order_number','管理番号')}
            ${thSort('order_code','注文番号')}
            ${thSort('item_code','商品コード')}
            ${thSort('item_name','商品名')}
            ${thSort('amount','数量')}
            ${thSort('unit_price','単価')}
            ${thSort('amount_price','金額')}
            <th>予約</th>
          </tr></thead>
          <tbody id="orders-body">
            ${rows.map(r => `<tr>
              <td class="text-xs">${fmtDate(r.order_date)}</td>
              <td><span class="badge ${SHOP_COLORS[normShop(r.shop_code)]||'badge-gray'} text-xs">${escHtml(SHOP_MAP[normShop(r.shop_code)]||r.shop_code)}</span></td>
              <td class="text-xs font-mono">${/^\d+$/.test(r.order_number||'') ? escHtml(r.order_number) : '—'}</td>
              <td class="text-xs font-mono">${escHtml(r.order_code || r.order_number)}</td>
              <td class="text-xs font-mono">${escHtml(r.item_code)}</td>
              <td class="text-xs max-w-[200px] truncate" title="${escHtml(r.item_name)}">${escHtml(truncate(r.item_name, 25))}</td>
              <td class="text-right text-xs">${num(r.amount)}</td>
              <td class="text-right text-xs font-mono">${yen(r.unit_price)}</td>
              <td class="text-right text-xs font-mono">${yen(r.amount_price)}</td>
              <td>${r.is_reservation ? '<span class="badge badge-purple text-xs">予約</span>' : ''}</td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>
    `;

    const paginationHtml = totalPages > 1 ? `
      <div class="flex justify-center items-center gap-2 mt-4">
        <button class="btn btn-secondary text-xs" id="order-prev" ${page<=1?'disabled':''}>前へ</button>
        <span class="text-sm text-gray-500">${page} / ${totalPages}</span>
        <button class="btn btn-secondary text-xs" id="order-next" ${page>=totalPages?'disabled':''}>次へ</button>
      </div>
    ` : '';

    el.innerHTML = `
      <h2 class="text-lg font-bold mb-4">注文一覧</h2>
      ${filtersHtml}${summaryHtml}${tableHtml}${paginationHtml}
    `;

    // Event listeners
    el.querySelectorAll('.shop-toggle').forEach(btn => {
      btn.addEventListener('click', () => {
        const code = btn.dataset.shop;
        if (shops.includes(code)) {
          if (shops.length > 1) shops = shops.filter(s => s !== code);
        } else {
          shops.push(code);
        }
        page = 1;
        loadAndRender();
      });
    });

    document.getElementById('order-date-from')?.addEventListener('change', e => { dateFrom = e.target.value; page = 1; loadAndRender(); });
    document.getElementById('order-date-to')?.addEventListener('change', e => { dateTo = e.target.value; page = 1; loadAndRender(); });
    document.getElementById('order-search')?.addEventListener('input', debounce(e => { search = e.target.value; page = 1; loadAndRender(); }, 400));
    document.getElementById('order-reserve')?.addEventListener('change', e => { reservationOnly = e.target.checked; page = 1; loadAndRender(); });
    document.getElementById('order-limit')?.addEventListener('change', e => { limit = parseInt(e.target.value); page = 1; loadAndRender(); });
    document.getElementById('order-prev')?.addEventListener('click', () => { if (page > 1) { page--; loadAndRender(); } });
    document.getElementById('order-next')?.addEventListener('click', () => { page++; loadAndRender(); });

    el.querySelectorAll('#orders-table th[data-sort]').forEach(th => {
      th.addEventListener('click', () => {
        const col = th.dataset.sort;
        if (sortCol === col) sortDir = sortDir === 'asc' ? 'desc' : 'asc';
        else { sortCol = col; sortDir = 'asc'; }
        page = 1;
        loadAndRender();
      });
    });
  }

  loadAndRender();
}

function debounce(fn, ms) {
  let t;
  return function(...args) { clearTimeout(t); t = setTimeout(() => fn.apply(this, args), ms); };
}

// ============================================================
// PAGE: PRODUCTS
// ============================================================
async function pageProducts(el) {
  const { data: products, error } = await sb.from('products').select('*').order('jan_code');
  if (error) { el.innerHTML = `<p class="text-red-600">エラー: ${escHtml(error.message)}</p>`; return; }

  let search = '';
  let sortCol = 'jan_code';
  let sortDir = 'asc';

  function render() {
    let rows = products || [];
    if (search) {
      const q = search.toLowerCase();
      rows = rows.filter(p =>
        (p.jan_code||'').toLowerCase().includes(q) ||
        (p.product_name||'').toLowerCase().includes(q) ||
        (p.maker||'').toLowerCase().includes(q)
      );
    }
    rows.sort((a,b) => {
      let va = a[sortCol], vb = b[sortCol];
      if (va == null) va = ''; if (vb == null) vb = '';
      if (typeof va === 'number') return sortDir === 'asc' ? va - vb : vb - va;
      return sortDir === 'asc' ? String(va).localeCompare(String(vb)) : String(vb).localeCompare(String(va));
    });

    el.innerHTML = `
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-lg font-bold">商品管理</h2>
        <span class="text-sm text-gray-500">${rows.length}件</span>
      </div>
      <div class="mb-4">
        <input type="text" class="input w-64" placeholder="JAN / 商品名 / メーカー..." id="product-search" value="${escHtml(search)}">
      </div>
      <div class="card overflow-x-auto">
        <table class="data-table" id="products-table">
          <thead><tr>
            <th data-sort="jan_code">JAN${sortIndicator(sortCol,sortDir,'jan_code')}</th>
            <th data-sort="product_name">商品名${sortIndicator(sortCol,sortDir,'product_name')}</th>
            <th data-sort="maker">メーカー${sortIndicator(sortCol,sortDir,'maker')}</th>
            <th data-sort="unit_price" class="text-right">定価${sortIndicator(sortCol,sortDir,'unit_price')}</th>
            <th data-sort="wholesale_rate" class="text-right">掛率${sortIndicator(sortCol,sortDir,'wholesale_rate')}</th>
            <th data-sort="cost_price_tax_incl" class="text-right">仕入値(税込)${sortIndicator(sortCol,sortDir,'cost_price_tax_incl')}</th>
            <th data-sort="tax_rate" class="text-right">税率${sortIndicator(sortCol,sortDir,'tax_rate')}</th>
            <th data-sort="status">ステータス${sortIndicator(sortCol,sortDir,'status')}</th>
          </tr></thead>
          <tbody>
            ${rows.map(p => `<tr>
              <td class="font-mono text-xs">${escHtml(p.jan_code)}</td>
              <td class="text-xs max-w-[300px] truncate" title="${escHtml(p.product_name)}">${escHtml(cleanProductName(p.product_name, p.maker))}</td>

// PAGE: SKUs
// ============================================================
async function pageSkus(el) {
  const { data: skus, error } = await sb.from('sku_product_view').select('*').order('sku_code');
  if (error) { el.innerHTML = `<p class="text-red-600">エラー: ${escHtml(error.message)}</p>`; return; }

  let search = '';
  let filterPool = '';
  let showInactive = false;
  let sortCol = 'sku_code';
  let sortDir = 'asc';

  function render() {
    let rows = skus || [];
    if (!showInactive) rows = rows.filter(s => s.is_active);
    if (filterPool) rows = rows.filter(s => s.inventory_pool === filterPool);
    if (search) {
      const q = search.toLowerCase();
      rows = rows.filter(s =>
        (s.sku_code||'').toLowerCase().includes(q) ||
        (s.jan_code||'').toLowerCase().includes(q) ||
        (s.product_name||'').toLowerCase().includes(q) ||
        (s.asin||'').toLowerCase().includes(q)
      );
    }
    rows.sort((a,b) => {
      let va = a[sortCol], vb = b[sortCol];
      if (va == null) va = ''; if (vb == null) vb = '';
      if (typeof va === 'number') return sortDir === 'asc' ? va - vb : vb - va;
      return sortDir === 'asc' ? String(va).localeCompare(String(vb)) : String(vb).localeCompare(String(va));
    });

    el.innerHTML = `
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-lg font-bold">SKU管理</h2>
        <span class="text-sm text-gray-500">${rows.length}件</span>
      </div>
      <div class="flex flex-wrap gap-2 mb-4">
        <input type="text" class="input w-48" placeholder="検索..." id="sku-search" value="${escHtml(search)}">
        <select class="input" id="sku-pool-filter">
          <option value="">全プール</option>
          <option value="box" ${filterPool==='box'?'selected':''}>BOX</option>
          <option value="set" ${filterPool==='set'?'selected':''}>SET</option>
        </select>
        <label class="flex items-center gap-1 text-sm text-gray-600">
          <input type="checkbox" id="sku-inactive" ${showInactive?'checked':''}>非アクティブ表示
        </label>
      </div>
      <div class="card overflow-x-auto">
        <table class="data-table" id="skus-table">
          <thead><tr>
            <th data-sort="sku_code">SKU${sortIndicator(sortCol,sortDir,'sku_code')}</th>
            <th data-sort="jan_code">JAN${sortIndicator(sortCol,sortDir,'jan_code')}</th>
            <th data-sort="asin">ASIN${sortIndicator(sortCol,sortDir,'asin')}</th>
            <th data-sort="product_name">商品名${sortIndicator(sortCol,sortDir,'product_name')}</th>
            <th data-sort="sale_unit">種別${sortIndicator(sortCol,sortDir,'sale_unit')}</th>
            <th data-sort="inventory_pool">プール${sortIndicator(sortCol,sortDir,'inventory_pool')}</th>
            <th data-sort="pricing_level">レベル${sortIndicator(sortCol,sortDir,'pricing_level')}</th>
            <th data-sort="current_price" class="text-right">価格${sortIndicator(sortCol,sortDir,'current_price')}</th>
            <th data-sort="stock_quantity" class="text-right">在庫${sortIndicator(sortCol,sortDir,'stock_quantity')}</th>
            <th data-sort="is_active">状態${sortIndicator(sortCol,sortDir,'is_active')}</th>
          </tr></thead>
          <tbody>
            ${rows.map(s => `<tr>
              <td class="font-mono text-xs">${escHtml(s.sku_code)}</td>
              <td class="font-mono text-xs">${escHtml(s.jan_code)}</td>
              <td class="font-mono text-xs">${escHtml(s.asin)}</td>
              <td class="text-xs max-w-[200px] truncate" title="${escHtml(s.product_name)}">${escHtml(truncate(s.product_name, 25))}</td>
              <td><span class="badge badge-gray text-xs">${escHtml(s.sale_unit)}</span></td>
              <td><span class="badge ${s.inventory_pool==='box'?'badge-blue':'badge-amber'} text-xs">${escHtml(s.inventory_pool)}</span></td>
              <td><span class="badge ${LEVEL_COLORS[s.pricing_level]||'badge-gray'} text-xs">${escHtml(s.pricing_level)}</span></td>
              <td class="text-right font-mono text-xs">${yen(s.current_price)}</td>
              <td class="text-right text-xs">${s.stock_quantity != null ? num(s.stock_quantity) : '—'}</td>
              <td><span class="badge ${s.is_active?'badge-green':'badge-gray'} text-xs">${s.is_active?'有効':'無効'}</span></td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>
    `;

    document.getElementById('sku-search').addEventListener('input', e => { search = e.target.value; render(); });
    document.getElementById('sku-pool-filter').addEventListener('change', e => { filterPool = e.target.value; render(); });
    document.getElementById('sku-inactive').addEventListener('change', e => { showInactive = e.target.checked; render(); });
    el.querySelectorAll('#skus-table th[data-sort]').forEach(th => {
      th.addEventListener('click', () => {
        const col = th.dataset.sort;
        if (sortCol === col) sortDir = sortDir === 'asc' ? 'desc' : 'asc';
        else { sortCol = col; sortDir = 'asc'; }
        render();
      });
    });
  }

  render();
}

                  <td class="font-mono text-xs">${escHtml(s.key)}</td>
                  <td><input type="text" class="input w-full text-xs setting-val" data-key="${escHtml(s.key)}" value="${escHtml(val)}"></td>

                </tr>`;
              }).join('')}
            </tbody>
          </table>
        </div>
      `;

      container.querySelectorAll('.setting-save').forEach(btn => {
        btn.addEventListener('click', async () => {
          const key = btn.dataset.key;
          const input = container.querySelector(`.setting-val[data-key="${key}"]`);
          let value = input.value;
          // Try to parse as JSON
          try { value = JSON.parse(value); } catch {}
          btn.disabled = true;
          const { error } = await sb.from('settings').update({ value }).eq('key', key);
          btn.disabled = false;
          if (error) toast('保存失敗: ' + error.message, 'error');
          else {
            toast('保存しました');
            const s = settings.find(x => x.key === key);
            if (s) s.value = value;
          }
        });
      });
    }

    if (activeTab === 'sellers') {
      container.innerHTML = `
        <div class="card">
          <table class="data-table">
            <thead><tr><th>セラーID</th><th>表示名</th><th>デフォルトフラグ</th><th>メモ</th><th></th></tr></thead>
            <tbody>
              ${sellers.map(s => `<tr>
                <td class="font-mono text-xs">${escHtml(s.seller_id)}</td>
                <td><input type="text" class="input text-xs seller-field" data-id="${escHtml(s.seller_id)}" data-field="display_name" value="${escHtml(s.display_name||'')}"></td>
                <td>
                  <select class="input text-xs seller-field" data-id="${escHtml(s.seller_id)}" data-field="default_flag">
                    <option value="" ${!s.default_flag?'selected':''}>なし</option>
                    <option value="exclude" ${s.default_flag==='exclude'?'selected':''}>除外</option>
                    <option value="focus" ${s.default_flag==='focus'?'selected':''}>注目</option>
                  </select>
                </td>
                <td><input type="text" class="input text-xs seller-field" data-id="${escHtml(s.seller_id)}" data-field="memo" value="${escHtml(s.memo||'')}"></td>
                <td><button class="btn btn-primary text-xs py-0.5 px-2 seller-save" data-id="${escHtml(s.seller_id)}">保存</button></td>
              </tr>`).join('')}

        btn.addEventListener('click', async () => {
          const id = btn.dataset.id;
          const fields = container.querySelectorAll(`.seller-field[data-id="${id}"]`);
          const data = {};
          fields.forEach(f => { data[f.dataset.field] = f.value || null; });
          btn.disabled = true;
          const { error } = await sb.from('seller_master').update(data).eq('seller_id', id);
          btn.disabled = false;
          if (error) toast('保存失敗: ' + error.message, 'error');
          else toast('保存しました');
        });

      container.innerHTML = `
        <div class="card">
          <table class="data-table">
            <thead><tr><th>セラーID</th><th>セラー名</th><th>理由</th></tr></thead>
            <tbody>
              ${ignored.map(s => `<tr>
                <td class="font-mono text-xs">${escHtml(s.seller_id)}</td>
                <td class="text-xs">${escHtml(s.seller_name)}</td>
                <td class="text-xs text-gray-500">${escHtml(s.reason)}</td>
              </tr>`).join('')}
            </tbody>
          </table>
        </div>
      `;
    }

    if (activeTab === 'users' && isAdmin) {
      container.innerHTML = `
        <div class="card mb-4">
          <h3 class="font-semibold text-sm mb-3">ユーザー追加</h3>
          <div class="flex gap-2">
            <input type="email" class="input flex-1 text-xs" placeholder="メールアドレス" id="new-user-email">
            <select class="input text-xs" id="new-user-role">
              <option value="viewer">viewer</option>
              <option value="admin">admin</option>
            </select>
            <button class="btn btn-primary text-xs" id="add-user-btn">追加</button>
          </div>
        </div>
        <div class="card">
          <table class="data-table">
            <thead><tr><th>メールアドレス</th><th>ロール</th><th>追加日</th><th></th></tr></thead>
            <tbody>
              ${allowedUsers.map(u => `<tr>
                <td class="text-xs">${escHtml(u.email)}</td>
                <td>
                  <select class="input text-xs py-0.5 user-role-select" data-email="${escHtml(u.email)}">
                    <option value="viewer" ${u.role==='viewer'?'selected':''}>viewer</option>
                    <option value="admin" ${u.role==='admin'?'selected':''}>admin</option>
                  </select>
                </td>
                <td class="text-xs text-gray-500">${fmtDateShort(u.created_at)}</td>
                <td><button class="btn btn-secondary text-xs py-0.5 px-2 text-red-600 delete-user-btn" data-email="${escHtml(u.email)}">削除</button></td>
              </tr>`).join('')}
            </tbody>
          </table>
        </div>
      `;

      document.getElementById('add-user-btn').addEventListener('click', async () => {
        const email = document.getElementById('new-user-email').value.trim();
        const role = document.getElementById('new-user-role').value;
        if (!email) return;
        const { error } = await sb.from('allowed_users').insert({ email, role });
        if (error) toast('追加失敗: ' + error.message, 'error');
        else { toast(email + ' を追加しました'); allowedUsers.push({ email, role, created_at: new Date().toISOString() }); render(); }
      });

      container.querySelectorAll('.user-role-select').forEach(sel => {
        sel.addEventListener('change', async e => {
          const email = e.target.dataset.email;
          const { error } = await sb.from('allowed_users').update({ role: e.target.value }).eq('email', email);
          if (error) toast('更新失敗: ' + error.message, 'error');
          else { toast('ロールを更新しました'); const u = allowedUsers.find(x => x.email === email); if (u) u.role = e.target.value; }
        });
      });

      container.querySelectorAll('.delete-user-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
          const email = btn.dataset.email;
          if (email === currentUser.email) { toast('自分自身は削除できません', 'error'); return; }
          if (!confirm(email + ' を削除しますか？')) return;
          const { error } = await sb.from('allowed_users').delete().eq('email', email);
          if (error) toast('削除失敗: ' + error.message, 'error');
          else { toast(email + ' を削除しました'); allowedUsers = allowedUsers.filter(u => u.email !== email); render(); }
        });
      });
    }

    // Notification settings tab
    if (activeTab === 'notify') {
      // Load discord_notify_config
      const configRow = settings.find(s => s.key === 'discord_notify_config');
      let notifyConfig = {
        amazon: { webhook_url: '', fields: ['product_name','amz_price','amz_lowest'], enabled: true },
        rakuten: { webhook_url: '', fields: ['product_name','rk_sales_30d'], enabled: true },
        yahoo: { webhook_url: '', fields: ['product_name','yh_sales_30d'], enabled: true },
      };
      if (configRow?.value) {
        try {
          const parsed = typeof configRow.value === 'string' ? JSON.parse(configRow.value) : configRow.value;
          notifyConfig = { ...notifyConfig, ...parsed };
        } catch {}
      }

      const mallDefs = [
        { key: 'amazon', label: 'Amazon', color: '#0ea5e9' },
        { key: 'rakuten', label: '楽天', color: '#dc2626' },
        { key: 'yahoo', label: 'Yahoo', color: '#9333ea' },
      ];

      let nh = '<p class="text-xs text-gray-500 mb-4">各モールの注文通知で送信するフィールドとWebhook URLを設定します。</p>';

      for (const mall of mallDefs) {
        const mc = notifyConfig[mall.key] || { webhook_url: '', fields: [], enabled: true };
        nh += `<div class="notify-section" data-mall="${mall.key}">`;
        nh += `<h4><span class="notify-dot" style="background:${mall.color}"></span>${mall.label}</h4>`;

        // Enable toggle
        nh += `<div class="flex items-center gap-3 mb-2">`;
        nh += `<label class="toggle-sw"><input type="checkbox" class="notify-enabled" data-mall="${mall.key}" ${mc.enabled!==false?'checked':''}><span class="toggle-sl"></span></label>`;
        nh += '<span class="text-xs">通知有効</span></div>';

        // Webhook URL
        nh += `<div class="mb-3"><label class="text-xs text-gray-500 block mb-1">Webhook URL</label>`;
        nh += `<input type="text" class="input w-full text-xs font-mono notify-webhook" data-mall="${mall.key}" placeholder="https://discord.com/api/webhooks/..." value="${escHtml(mc.webhook_url || '')}"></div>`;

        // Field selection
        nh += '<div class="text-xs text-gray-500 mb-1">通知フィールド:</div>';
        for (const [bk, block] of Object.entries(FIELD_DEFS)) {
          nh += `<div class="field-group-lbl" style="color:${block.color}">${block.label}</div>`;
          nh += '<div class="field-grid">';
          for (const f of block.fields) {
            const checked = (mc.fields || []).includes(f.key);
            const labelText = f.type === 'image' ? f.label + ' (画像添付)' : f.label;
            nh += `<label class="field-check"><input type="checkbox" class="notify-field" data-mall="${mall.key}" data-field="${f.key}" ${checked?'checked':''}>${labelText}</label>`;
          }
          nh += '</div>';
        }

        // Test button
        nh += `<div class="mt-3 flex items-center gap-2">`;
        nh += `<button class="btn btn-secondary text-xs notify-test" data-mall="${mall.key}">テスト送信</button>`;
        nh += `<span class="text-xs text-gray-500 notify-test-result" data-mall="${mall.key}"></span></div>`;
        nh += '</div>';
      }

      // Save button
      nh += '<div class="mt-4"><button class="btn btn-primary text-xs" id="save-notify-config">設定を保存</button>';
      nh += '<span id="notify-save-msg" class="text-xs text-gray-500 ml-3"></span></div>';

      container.innerHTML = nh;

      // Save handler
      document.getElementById('save-notify-config').addEventListener('click', async () => {
        const newConfig = {};
        for (const mall of mallDefs) {
          const enabled = container.querySelector(`.notify-enabled[data-mall="${mall.key}"]`).checked;
          const webhook_url = container.querySelector(`.notify-webhook[data-mall="${mall.key}"]`).value.trim();
          const fields = [];
          container.querySelectorAll(`.notify-field[data-mall="${mall.key}"]:checked`).forEach(cb => fields.push(cb.dataset.field));
          newConfig[mall.key] = { webhook_url, fields, enabled };
        }
        const { error } = await sb.from('settings').upsert({ key: 'discord_notify_config', value: newConfig, description: 'モール別Discord通知設定' });
        const msg = document.getElementById('notify-save-msg');
        if (error) { msg.textContent = 'エラー: ' + error.message; toast('保存失敗', 'error'); }
        else { msg.textContent = '保存しました'; toast('通知設定を保存しました'); }
        setTimeout(() => { msg.textContent = ''; }, 3000);
      });

      // Test send handlers
      container.querySelectorAll('.notify-test').forEach(btn => {
        btn.addEventListener('click', async () => {
          const mk = btn.dataset.mall;
          const webhookUrl = container.querySelector(`.notify-webhook[data-mall="${mk}"]`).value.trim();
          const resultSpan = container.querySelector(`.notify-test-result[data-mall="${mk}"]`);
          if (!webhookUrl) { resultSpan.textContent = 'Webhook URLを入力してください'; return; }

          const selectedFields = [];
          container.querySelectorAll(`.notify-field[data-mall="${mk}"]:checked`).forEach(cb => selectedFields.push(cb.dataset.field));

          const mallInfo = mallDefs.find(m => m.key === mk);
          const colorDec = parseInt(mallInfo.color.replace('#',''), 16);
          const embedFields = [];
          for (const fk of selectedFields) {
            let fDef = null;
            for (const block of Object.values(FIELD_DEFS)) {
              fDef = block.fields.find(f => f.key === fk);
              if (fDef) break;
            }
            if (fDef && fDef.type !== 'image') {
              embedFields.push({ name: fDef.label, value: 'テストデータ', inline: true });
            }
          }

          const embed = {
            title: `テスト通知 - ${mallInfo.label}`,
            color: colorDec,
            fields: embedFields.length > 0 ? embedFields : [{ name: 'テスト', value: 'テスト通知です', inline: false }],
            timestamp: new Date().toISOString(),
          };

          resultSpan.textContent = '送信中...';
          try {
            const res = await fetch(webhookUrl, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ embeds: [embed] }),
            });
            resultSpan.textContent = res.ok ? '送信成功' : `エラー: ${res.status}`;
          } catch(e) {
            resultSpan.textContent = 'エラー: ' + e.message;
          }
          setTimeout(() => { resultSpan.textContent = ''; }, 5000);
        });
      });
    }
  }

  render();
}

            <thead><tr><th>日時</th><th>SKU</th><th>旧価格</th><th>新価格</th><th>トリガー</th><th>レベル</th><th>最安競合</th><th>理由</th></tr></thead>
            <tbody>
              ${(data||[]).map(h => `<tr>
                <td class="text-xs">${fmtDate(h.created_at)}</td>
                <td class="font-mono text-xs">${escHtml(h.sku_code)}</td>
                <td class="text-right font-mono text-xs">${yen(h.old_price)}</td>
                <td class="text-right font-mono text-xs">${yen(h.new_price)}</td>
                <td><span class="badge badge-gray text-xs">${escHtml(h.trigger_type)}</span></td>
                <td><span class="badge ${LEVEL_COLORS[h.pricing_level]||'badge-gray'} text-xs">${escHtml(h.pricing_level)}</span></td>
                <td class="text-right font-mono text-xs">${yen(h.lowest_competitor_price)}</td>
                <td class="text-xs text-gray-500 max-w-[300px] truncate" title="${escHtml(h.reason)}">${escHtml(truncate(h.reason, 50))}</td>
              </tr>`).join('')}
            </tbody>
          </table>
        </div>
      `;
    }

    if (activeTab === 'notifications') {
      const { data, error } = await sb.from('notifications_log').select('*').order('sent_at', { ascending: false }).limit(200);
      if (error) { container.innerHTML = `<p class="text-red-600">${escHtml(error.message)}</p>`; return; }
      container.innerHTML = `
        <div class="card overflow-x-auto">
          <table class="data-table">
            <thead><tr><th>日時</th><th>チャネル</th><th>イベント</th><th>ペイロード</th></tr></thead>
            <tbody>
              ${(data||[]).map(n => `<tr>
                <td class="text-xs">${fmtDate(n.sent_at)}</td>
                <td><span class="badge badge-gray text-xs">${escHtml(n.channel)}</span></td>
                <td class="text-xs">${escHtml(n.event_type)}</td>
                <td class="text-xs font-mono max-w-[400px] truncate" title="${escHtml(JSON.stringify(n.payload))}">${escHtml(truncate(JSON.stringify(n.payload), 60))}</td>
              </tr>`).join('')}
            </tbody>
          </table>
        </div>
      `;
    }
  }

  render();
}

// ============================================================
// INIT
// ============================================================
checkAuth();
sb.auth.onAuthStateChange((event, session) => {
  if (event === 'SIGNED_IN' && session) checkAuth();
  if (event === 'SIGNED_OUT') location.reload();
});
</script>
</body>
</html>
