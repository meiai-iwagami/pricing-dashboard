<style>
  [x-cloak] { display: none !important; }
  .loader { border: 3px solid #e5e7eb; border-top-color: #3b82f6; border-radius: 50%; width: 24px; height: 24px; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .sidebar-link { display: flex; align-items: center; gap: 0.5rem; padding: 0.5rem 1rem; border-radius: 0.375rem; font-size: 0.875rem; color: #374151; transition: background-color 0.15s; }
  .sidebar-link:hover { background-color: #f3f4f6; }
  .sidebar-link.active { background-color: #eff6ff; color: #2563eb; font-weight: 600; }
  table.data-table { width: 100%; border-collapse: collapse; font-size: 0.8125rem; }
  table.data-table th { background: #f9fafb; border-bottom: 2px solid #e5e7eb; padding: 0.5rem; text-align: left; font-weight: 600; white-space: nowrap; cursor: pointer; user-select: none; }
  table.data-table th:hover { background: #f3f4f6; }
  table.data-table td { border-bottom: 1px solid #f3f4f6; padding: 0.375rem 0.5rem; white-space: nowrap; }
  table.data-table tr:hover td { background: #fafbfc; }
  .badge { display: inline-block; padding: 0.125rem 0.5rem; border-radius: 9999px; font-size: 0.75rem; font-weight: 500; }
  .badge-blue { background: #dbeafe; color: #1e40af; }
  .badge-green { background: #dcfce7; color: #166534; }
  .badge-amber { background: #fef3c7; color: #92400e; }
  .badge-red { background: #fee2e2; color: #991b1b; }
  .badge-gray { background: #f3f4f6; color: #4b5563; }
  .badge-purple { background: #f3e8ff; color: #6b21a8; }
  .card { background: white; border: 1px solid #e5e7eb; border-radius: 0.5rem; padding: 1rem; }
  .btn { padding: 0.375rem 0.75rem; border-radius: 0.375rem; font-size: 0.8125rem; font-weight: 500; cursor: pointer; transition: all 0.15s; }
  .btn-primary { background: #2563eb; color: white; }
  .btn-primary:hover { background: #1d4ed8; }
  .btn-secondary { background: white; border: 1px solid #d1d5db; color: #374151; }

  .input:focus { border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59,130,246,0.15); }

  .shop-02 { background: #0ea5e9; color: white; }
  .shop-03 { background: #9333ea; color: white; }
  .toast { position: fixed; bottom: 1.5rem; right: 1.5rem; padding: 0.75rem 1.25rem; border-radius: 0.5rem; font-size: 0.875rem; color: white; z-index: 9999; animation: slideUp 0.3s ease; }
  @keyframes slideUp { from { transform: translateY(1rem); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
</style>

<script>
// ============================================================
// CONFIG
// ============================================================
const SUPABASE_URL = 'https://jfumuyirzgnasoyjvhfb.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpmdW11eWlyemduYXNveWp2aGZiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0MzM2MDMsImV4cCI6MjA4ODAwOTYwM30.YWi6sLZnc64OpK5LnM9funYb3vP35qGU3AJbve2wQJs';

const SHOP_MAP = { '01': '楽天', '02': 'Amazon', '03': 'Yahoo' };
const SHOP_COLORS = { '01': 'shop-01', '02': 'shop-02', '03': 'shop-03' };
const LEVEL_OPTIONS = ['Lv.1','Lv.2','Lv.2固定','Lv.3','Lv.4','セラー追従','OFF'];
const LEVEL_COLORS = {
  'Lv.1': 'badge-blue', 'Lv.2': 'badge-green', 'Lv.2固定': 'badge-green',
  'Lv.3': 'badge-amber', 'Lv.4': 'badge-red', 'セラー追従': 'badge-purple', 'OFF': 'badge-gray'
};

// ============================================================
// SUPABASE CLIENT
// ============================================================
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ============================================================
// STATE
// ============================================================
let currentUser = null;
let userRole = null;

// ============================================================
// AUTH
// ============================================================
async function signIn() {
  const { error } = await sb.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: location.origin + location.pathname }
  });
  if (error) {
    document.getElementById('login-error').textContent = error.message;
    document.getElementById('login-error').classList.remove('hidden');
  }
}

async function signOut() {
  await sb.auth.signOut();
  location.reload();
}

async function checkAuth() {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) {
    show('login-screen');
    return;
  }
  currentUser = session.user;

  // Check whitelist access
  const { data: role } = await sb.rpc('check_user_access');
  if (!role) {
    document.getElementById('no-access-email').textContent = currentUser.email;
    show('no-access-screen');
    return;
  }
  userRole = role;
  document.getElementById('user-email').textContent = currentUser.email;
  show('app');
  initRouter();
}

function show(id) {
  ['login-screen', 'no-access-screen', 'app'].forEach(s => {
    document.getElementById(s).classList.toggle('hidden', s !== id);
  });
}

// ============================================================
// ROUTER
// ============================================================
const routes = {
  '/': pageDashboard,
  '/pricing': pagePricing,
  '/orders': pageOrders,
  '/products': pageProducts,
  '/skus': pageSkus,
  '/settings': pageSettings,
  '/logs': pageLogs,
};

function initRouter() {
  window.addEventListener('hashchange', handleRoute);
  handleRoute();
}

function handleRoute() {
  const hash = location.hash.replace('#', '') || '/';
  const page = routes[hash] || pageDashboard;

  // Update sidebar active state
  document.querySelectorAll('.sidebar-link').forEach(el => {
    el.classList.toggle('active', el.dataset.page === hash);
  });

  const content = document.getElementById('content');
  content.innerHTML = '<div class="flex justify-center py-20"><div class="loader"></div></div>';
  page(content);
}

// ============================================================
// UTILS
// ============================================================
function yen(n) {
  if (n == null) return '—';
  return '¥' + Number(n).toLocaleString();
}

function num(n) {
  if (n == null) return '—';
  return Number(n).toLocaleString();
}

function pct(n) {
  if (n == null) return '—';
  return (Number(n) * 100).toFixed(1) + '%';
}

function fmtDate(d) {
  if (!d) return '—';
  const dt = new Date(d);
  const y = String(dt.getFullYear()).slice(2);
  const m = String(dt.getMonth() + 1).padStart(2, '0');
  const day = String(dt.getDate()).padStart(2, '0');
  const h = String(dt.getHours()).padStart(2, '0');
  const min = String(dt.getMinutes()).padStart(2, '0');
  return `${y}/${m}/${day} ${h}:${min}`;
}

function fmtDateShort(d) {
  if (!d) return '—';
  const dt = new Date(d);
  return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
}

function escHtml(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function toast(msg, type = 'success') {
  const bg = type === 'success' ? 'bg-emerald-600' : type === 'error' ? 'bg-red-600' : 'bg-blue-600';
  const el = document.createElement('div');
  el.className = `toast ${bg}`;
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

function sortIndicator(currentSort, currentDir, col) {
  if (currentSort !== col) return '';
  return currentDir === 'asc' ? ' ↑' : ' ↓';
}

function truncate(s, len = 30) {
  if (!s) return '—';
  return s.length > len ? s.slice(0, len) + '...' : s;
}

// Clean product name: remove maker prefix and trailing N個入
function cleanProductName(name, maker) {
  if (!name) return '—';
  let s = name;
  if (maker && s.startsWith(maker)) s = s.slice(maker.length).trim();
  s = s.replace(/\s*\d+個入\s*$/, '');
  return s || name;
}

// ============================================================
// PAGE: DASHBOARD
// ============================================================
async function pageDashboard(el) {
  const [skuRes, histRes, orderRes] = await Promise.all([
    sb.from('sku_product_view').select('sku_code, is_active, pricing_level, current_price, stock_quantity', { count: 'exact' }),
    sb.from('price_history').select('id, sku_code, old_price, new_price, trigger_type, reason, created_at').order('created_at', { ascending: false }).limit(20),
    sb.from('order_details_flat').select('order_number, amount_price, order_date').order('order_date', { ascending: false }).limit(100),
  ]);

  const skus = skuRes.data || [];
  const history = histRes.data || [];
  const orders = orderRes.data || [];
  const activeSkus = skus.filter(s => s.is_active);
  const today = new Date().toISOString().slice(0, 10);
  const todayChanges = history.filter(h => h.created_at?.startsWith(today));
  const todayOrders = orders.filter(o => o.order_date?.startsWith(today));
  const uniqueTodayOrders = new Set(todayOrders.map(o => o.order_number)).size;

  // Level distribution
  const levelDist = {};
  activeSkus.forEach(s => { levelDist[s.pricing_level] = (levelDist[s.pricing_level] || 0) + 1; });

  el.innerHTML = `
    <h2 class="text-lg font-bold mb-4">ダッシュボード</h2>
    <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
      <div class="card">
        <div class="text-xs text-gray-500">総SKU数</div>
        <div class="text-2xl font-bold">${num(skus.length)}</div>
        <div class="text-xs text-gray-400">アクティブ: ${num(activeSkus.length)}</div>
      </div>
      <div class="card">
        <div class="text-xs text-gray-500">本日の価格変更</div>
        <div class="text-2xl font-bold">${num(todayChanges.length)}</div>
      </div>
      <div class="card">
        <div class="text-xs text-gray-500">本日の注文</div>
        <div class="text-2xl font-bold">${num(uniqueTodayOrders)}</div>
        <div class="text-xs text-gray-400">明細: ${num(todayOrders.length)}件</div>
      </div>
      <div class="card">
        <div class="text-xs text-gray-500">本日の売上</div>
        <div class="text-2xl font-bold">${yen(todayOrders.reduce((s,o) => s + (Number(o.amount_price)||0), 0))}</div>
      </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
      <div class="card">
        <h3 class="font-semibold text-sm mb-3">レベル分布</h3>
        <div class="space-y-1.5">
          ${LEVEL_OPTIONS.map(lv => {
            const count = levelDist[lv] || 0;
            const ratio = activeSkus.length ? (count / activeSkus.length * 100) : 0;
            return `<div class="flex items-center gap-2 text-xs">
              <span class="badge ${LEVEL_COLORS[lv]} w-16 text-center">${lv}</span>
              <div class="flex-1 bg-gray-100 rounded h-4 overflow-hidden"><div class="h-full bg-blue-400 rounded" style="width:${ratio}%"></div></div>
              <span class="w-8 text-right text-gray-500">${count}</span>
            </div>`;
          }).join('')}
        </div>
      </div>
      <div class="card">
        <h3 class="font-semibold text-sm mb-3">最近の価格変更</h3>
        <div class="max-h-64 overflow-y-auto">
          <table class="data-table">
            <thead><tr><th>日時</th><th>SKU</th><th>変更</th><th>理由</th></tr></thead>
            <tbody>
              ${history.slice(0,10).map(h => `<tr>
                <td class="text-xs text-gray-500">${fmtDate(h.created_at)}</td>
                <td class="text-xs font-mono">${escHtml(h.sku_code)}</td>
                <td class="text-xs">${yen(h.old_price)} → ${yen(h.new_price)}</td>
                <td class="text-xs text-gray-500 max-w-[200px] truncate">${escHtml(truncate(h.reason, 40))}</td>
              </tr>`).join('')}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  `;
}

// ============================================================
// PAGE: PRICING
// ============================================================
async function pagePricing(el) {
  el.innerHTML = '<div class="flex justify-center py-20"><div class="loader"></div></div>';

  const [skuRes, compRes, settRes, presetRes, sellerRes, janOvRes, asinOvRes, keepaRes] = await Promise.all([
    sb.from('sku_product_view').select('*'),
    sb.from('competitor_offers').select('*'),
    sb.from('settings').select('*'),
    sb.from('seller_follow_presets').select('*'),
    sb.from('seller_master').select('*'),
    sb.from('seller_jan_overrides').select('*'),
    sb.from('seller_asin_overrides').select('*'),
    sb.from('keepa_product_data').select('*'),
  ]);

  const allSkus = skuRes.data || [];
  const offers = compRes.data || [];
  const settingsArr = settRes.data || [];
  const presets = presetRes.data || [];
  const sellers = sellerRes.data || [];
  const janOv = janOvRes.data || [];
  const asinOv = asinOvRes.data || [];
  const keepa = keepaRes.data || [];

  // Build lookup maps
  const settingsMap = {};
  settingsArr.forEach(s => settingsMap[s.key] = s.value);
  const offersByAsin = {};
  offers.forEach(o => { (offersByAsin[o.asin] = offersByAsin[o.asin] || []).push(o); });
  const keepaByAsin = {};
  keepa.forEach(k => keepaByAsin[k.asin] = k);
  const sellerMap = {};
  sellers.forEach(s => sellerMap[s.seller_id] = s);

  // State
  let search = '';
  let filterLevel = '';
  let filterPool = '';
  let showInactive = false;
  let sortCol = 'sku_code';
  let sortDir = 'asc';

  function getFilteredSkus() {
    let result = allSkus;
    if (!showInactive) result = result.filter(s => s.is_active);
    if (filterLevel) result = result.filter(s => s.pricing_level === filterLevel);
    if (filterPool) result = result.filter(s => s.inventory_pool === filterPool);
    if (search) {
      const q = search.toLowerCase();
      result = result.filter(s =>
        (s.sku_code || '').toLowerCase().includes(q) ||
        (s.jan_code || '').toLowerCase().includes(q) ||
        (s.product_name || '').toLowerCase().includes(q) ||
        (s.p_product_name || '').toLowerCase().includes(q) ||
        (s.asin || '').toLowerCase().includes(q)
      );
    }
    result.sort((a, b) => {
      let va = a[sortCol], vb = b[sortCol];
      if (va == null) va = '';
      if (vb == null) vb = '';
      if (typeof va === 'number' && typeof vb === 'number') return sortDir === 'asc' ? va - vb : vb - va;
      return sortDir === 'asc' ? String(va).localeCompare(String(vb)) : String(vb).localeCompare(String(va));
    });
    return result;
  }

  function getLowestCompetitor(asin) {
    const ownSellerId = settingsMap.own_seller_id ? JSON.parse(JSON.stringify(settingsMap.own_seller_id)).replace(/"/g, '') : '';
    const asinOffers = offersByAsin[asin] || [];
    const valid = asinOffers.filter(o => o.seller_id !== ownSellerId && o.price > 0);
    if (!valid.length) return null;
    return Math.min(...valid.map(o => o.price));
  }

  function render() {
    const skus = getFilteredSkus();
    const makers = [...new Set(allSkus.map(s => s.maker).filter(Boolean))].sort();

    el.innerHTML = `
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-lg font-bold">プライシング</h2>
        <span class="text-sm text-gray-500">${skus.length}件</span>
      </div>

      <div class="flex flex-wrap gap-2 mb-4">
        <input type="text" class="input w-48" placeholder="検索..." value="${escHtml(search)}" id="pricing-search">
        <select class="input" id="pricing-level-filter">

            <th>操作</th>
          </tr></thead>
          <tbody>
            ${skus.map(s => {
              const lowest = getLowestCompetitor(s.asin);
              const kp = keepaByAsin[s.asin];
              return `<tr data-sku="${escHtml(s.sku_code)}">
                <td class="font-mono text-xs">${escHtml(s.sku_code)}</td>
                <td class="max-w-[200px] truncate text-xs" title="${escHtml(s.product_name)}">${escHtml(truncate(s.product_name, 25))}</td>
                <td><span class="badge badge-gray">${escHtml(s.sale_unit)}</span></td>

                  </select>
                </td>
                <td class="text-right font-mono text-xs">
                  <input type="number" class="input text-right w-20 text-xs price-input" data-sku="${escHtml(s.sku_code)}" data-field="current_price" value="${s.current_price||''}">
                </td>
                <td class="text-right font-mono text-xs ${lowest && s.current_price && lowest < s.current_price ? 'text-red-600' : ''}">${lowest ? yen(lowest) : '—'}</td>
                <td class="text-right font-mono text-xs">${kp ? yen(kp.current_buy_box_price || kp.current_new_price) : '—'}</td>
                <td class="text-right text-xs">${s.stock_quantity != null ? num(s.stock_quantity) : '—'}</td>
                <td class="text-right">
                  <input type="number" step="0.01" class="input text-right w-16 text-xs mult-input" data-sku="${escHtml(s.sku_code)}" data-field="price_multiplier" value="${s.price_multiplier||''}">
                </td>
                <td>
                  <button class="btn btn-primary text-xs py-0.5 px-2 save-btn hidden" data-sku="${escHtml(s.sku_code)}">保存</button>
                </td>
              </tr>`;
            }).join('')}
          </tbody>

    document.getElementById('pricing-pool-filter').addEventListener('change', e => { filterPool = e.target.value; render(); });
    document.getElementById('pricing-inactive').addEventListener('change', e => { showInactive = e.target.checked; render(); });

    // Sort headers
    el.querySelectorAll('th[data-sort]').forEach(th => {
      th.addEventListener('click', () => {
        const col = th.dataset.sort;
        if (sortCol === col) sortDir = sortDir === 'asc' ? 'desc' : 'asc';
        else { sortCol = col; sortDir = 'asc'; }
        render();
      });
    });

    // Track changes per row
    const changes = {};
    function showSaveBtn(sku) {
      const btn = el.querySelector(`.save-btn[data-sku="${sku}"]`);
      if (btn) btn.classList.remove('hidden');
    }

    el.querySelectorAll('.level-select').forEach(sel => {
      sel.addEventListener('change', e => {
        const sku = e.target.dataset.sku;
        changes[sku] = changes[sku] || {};
        changes[sku].pricing_level = e.target.value;
        showSaveBtn(sku);
      });
    });

    el.querySelectorAll('.price-input').forEach(inp => {
      inp.addEventListener('change', e => {
        const sku = e.target.dataset.sku;
        changes[sku] = changes[sku] || {};
        changes[sku].current_price = e.target.value ? parseInt(e.target.value) : null;
        showSaveBtn(sku);
      });
    });

    el.querySelectorAll('.mult-input').forEach(inp => {
      inp.addEventListener('change', e => {
        const sku = e.target.dataset.sku;
        changes[sku] = changes[sku] || {};
        changes[sku].price_multiplier = e.target.value ? parseFloat(e.target.value) : null;
        showSaveBtn(sku);
      });
    });

    el.querySelectorAll('.save-btn').forEach(btn => {
      btn.addEventListener('click', async e => {
        const sku = e.target.dataset.sku;
        const data = changes[sku];
        if (!data) return;
        btn.disabled = true;
        btn.textContent = '...';
        const { error } = await sb.from('product_skus').update(data).eq('sku_code', sku);
        if (error) {
          toast('保存失敗: ' + error.message, 'error');
          btn.disabled = false;
          btn.textContent = '保存';
        } else {
          toast('保存しました');
          // Update local state
          const s = allSkus.find(x => x.sku_code === sku);
          if (s) Object.assign(s, data);
          delete changes[sku];
          btn.classList.add('hidden');
          btn.disabled = false;
          btn.textContent = '保存';
        }
      });
    });
  }

  render();
}

async function pageOrders(el) {
  // State
  let shops = ['01','02','03'];
  let dateFrom = '';
  let dateTo = '';
  let search = '';
  let reservationOnly = false;
  let page = 1;
  let limit = 50;
  let sortCol = 'order_date';
  let sortDir = 'desc';
  let reservationPhaseNames = [];

  // Load reservation phase names from settings
  const { data: settingsData } = await sb.from('settings').select('value').eq('key', 'reservation_phase_names').single();
  if (settingsData?.value) {
    try { reservationPhaseNames = Array.isArray(settingsData.value) ? settingsData.value : JSON.parse(settingsData.value); } catch {}
  }

  async function loadAndRender() {
    el.querySelector('#orders-body')?.closest('.card')?.classList.add('opacity-50');

    let query = sb.from('order_details_flat')
      .select('*', { count: 'exact' })
      .neq('cancel_flag', '1');

    if (shops.length > 0 && shops.length < 3) {
      query = query.in('shop_code', shops);
    }
    if (dateFrom) query = query.gte('order_date', dateFrom + 'T00:00:00');
    if (dateTo) query = query.lte('order_date', dateTo + 'T23:59:59');
    if (search) {
      query = query.or(`item_code.ilike.%${search}%,item_name.ilike.%${search}%,jan_cd.ilike.%${search}%`);
    }

    query = query.order(sortCol, { ascending: sortDir === 'asc' });
    const from = (page - 1) * limit;
    query = query.range(from, from + limit - 1);

    const { data: rows, count, error } = await query;
    if (error) { toast('データ取得エラー: ' + error.message, 'error'); return; }

    const totalCount = count || 0;
    const processedRows = (rows || []).map(r => ({
      ...r,
      is_reservation: r.reserve_type === '1' || (reservationPhaseNames.includes(r.phase_name))
    }));
    const filteredRows = reservationOnly ? processedRows.filter(r => r.is_reservation) : processedRows;

    // Unique order numbers
    const uniqueOrders = new Set(filteredRows.map(r => r.order_number)).size;
    const pageTotal = filteredRows.reduce((s, r) => s + (Number(r.amount_price) || 0), 0);
    const totalPages = Math.ceil(totalCount / limit);

    renderOrders(filteredRows, totalCount, uniqueOrders, pageTotal, totalPages);
  }

  function renderOrders(rows, totalCount, uniqueOrders, pageTotal, totalPages) {
    const summaryHtml = `
      <div class="grid grid-cols-3 gap-4 mb-4">
        <div class="card"><div class="text-xs text-gray-500">注文件数</div><div class="text-xl font-bold">${num(uniqueOrders)}</div></div>
        <div class="card"><div class="text-xs text-gray-500">明細件数</div><div class="text-xl font-bold">${num(totalCount)}</div></div>
        <div class="card"><div class="text-xs text-gray-500">合計金額（表示分）</div><div class="text-xl font-bold">${yen(pageTotal)}</div></div>
      </div>
    `;

    const filtersHtml = `
      <div class="flex flex-wrap gap-2 mb-4 items-center">
        <div class="flex gap-1">
          ${Object.entries(SHOP_MAP).map(([code, name]) => `
            <button class="btn text-xs shop-toggle ${shops.includes(code) ? 'btn-primary' : 'btn-secondary'}" data-shop="${code}">${name}</button>
          `).join('')}
        </div>
        <input type="date" class="input text-xs" id="order-date-from" value="${dateFrom}">
        <span class="text-gray-400 text-xs">〜</span>
        <input type="date" class="input text-xs" id="order-date-to" value="${dateTo}">
        <input type="text" class="input text-xs w-40" placeholder="検索..." id="order-search" value="${escHtml(search)}">
        <label class="flex items-center gap-1 text-xs text-gray-600">
          <input type="checkbox" id="order-reserve" ${reservationOnly?'checked':''}>予約のみ
        </label>
        <select class="input text-xs" id="order-limit">
          ${[50,100,200].map(n => `<option value="${n}" ${limit===n?'selected':''}>${n}件</option>`).join('')}
        </select>
      </div>
    `;

    const thSort = (col, label) =>
      `<th data-sort="${col}" class="${['amount','unit_price','amount_price'].includes(col)?'text-right':''}">${label}${sortIndicator(sortCol,sortDir,col)}</th>`;

    const tableHtml = `
      <div class="card overflow-x-auto">
        <table class="data-table" id="orders-table">
          <thead><tr>
            ${thSort('order_date','注文日')}
            ${thSort('shop_code','ショップ')}
            ${thSort('order_number','管理番号')}
            ${thSort('order_code','注文番号')}
            ${thSort('item_code','商品コード')}
            ${thSort('item_name','商品名')}
            ${thSort('amount','数量')}
            ${thSort('unit_price','単価')}
            ${thSort('amount_price','金額')}
            <th>予約</th>
          </tr></thead>
          <tbody id="orders-body">
            ${rows.map(r => `<tr>
              <td class="text-xs">${fmtDate(r.order_date)}</td>
              <td><span class="badge ${SHOP_COLORS[r.shop_code]||'badge-gray'} text-xs">${escHtml(SHOP_MAP[r.shop_code]||r.shop_code)}</span></td>
              <td class="text-xs font-mono">${/^\d+$/.test(r.order_number||'') ? escHtml(r.order_number) : '—'}</td>
              <td class="text-xs font-mono">${escHtml(r.order_code || r.order_number)}</td>
              <td class="text-xs font-mono">${escHtml(r.item_code)}</td>
              <td class="text-xs max-w-[200px] truncate" title="${escHtml(r.item_name)}">${escHtml(truncate(r.item_name, 25))}</td>
              <td class="text-right text-xs">${num(r.amount)}</td>
              <td class="text-right text-xs font-mono">${yen(r.unit_price)}</td>
              <td class="text-right text-xs font-mono">${yen(r.amount_price)}</td>
              <td>${r.is_reservation ? '<span class="badge badge-purple text-xs">予約</span>' : ''}</td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>
    `;

    const paginationHtml = totalPages > 1 ? `
      <div class="flex justify-center items-center gap-2 mt-4">
        <button class="btn btn-secondary text-xs" id="order-prev" ${page<=1?'disabled':''}>前へ</button>
        <span class="text-sm text-gray-500">${page} / ${totalPages}</span>
        <button class="btn btn-secondary text-xs" id="order-next" ${page>=totalPages?'disabled':''}>次へ</button>
      </div>
    ` : '';

    el.innerHTML = `
      <h2 class="text-lg font-bold mb-4">注文一覧</h2>
      ${filtersHtml}${summaryHtml}${tableHtml}${paginationHtml}
    `;

    // Event listeners
    el.querySelectorAll('.shop-toggle').forEach(btn => {
      btn.addEventListener('click', () => {
        const code = btn.dataset.shop;
        if (shops.includes(code)) {
          if (shops.length > 1) shops = shops.filter(s => s !== code);
        } else {
          shops.push(code);
        }
        page = 1;
        loadAndRender();
      });
    });

    document.getElementById('order-date-from')?.addEventListener('change', e => { dateFrom = e.target.value; page = 1; loadAndRender(); });
    document.getElementById('order-date-to')?.addEventListener('change', e => { dateTo = e.target.value; page = 1; loadAndRender(); });
    document.getElementById('order-search')?.addEventListener('input', debounce(e => { search = e.target.value; page = 1; loadAndRender(); }, 400));
    document.getElementById('order-reserve')?.addEventListener('change', e => { reservationOnly = e.target.checked; page = 1; loadAndRender(); });
    document.getElementById('order-limit')?.addEventListener('change', e => { limit = parseInt(e.target.value); page = 1; loadAndRender(); });
    document.getElementById('order-prev')?.addEventListener('click', () => { if (page > 1) { page--; loadAndRender(); } });
    document.getElementById('order-next')?.addEventListener('click', () => { page++; loadAndRender(); });

    el.querySelectorAll('#orders-table th[data-sort]').forEach(th => {
      th.addEventListener('click', () => {
        const col = th.dataset.sort;
        if (sortCol === col) sortDir = sortDir === 'asc' ? 'desc' : 'asc';
        else { sortCol = col; sortDir = 'asc'; }
        page = 1;
        loadAndRender();
      });
    });
  }

  loadAndRender();
}

function debounce(fn, ms) {
  let t;
  return function(...args) { clearTimeout(t); t = setTimeout(() => fn.apply(this, args), ms); };
}

    el.querySelectorAll('#products-table th[data-sort]').forEach(th => {
      th.addEventListener('click', () => {

        else { sortCol = col; sortDir = 'asc'; }
        render();
      });
    });

  render();

      </div>
    `;

    document.getElementById('sku-search').addEventListener('input', e => { search = e.target.value; render(); });
    document.getElementById('sku-pool-filter').addEventListener('change', e => { filterPool = e.target.value; render(); });
    document.getElementById('sku-inactive').addEventListener('change', e => { showInactive = e.target.checked; render(); });
    el.querySelectorAll('#skus-table th[data-sort]').forEach(th => {
      th.addEventListener('click', () => {
        const col = th.dataset.sort;
        if (sortCol === col) sortDir = sortDir === 'asc' ? 'desc' : 'asc';
        else { sortCol = col; sortDir = 'asc'; }
        render();
      });
    });
  }

  render();
}

// ============================================================
// PAGE: SETTINGS
// ============================================================
async function pageSettings(el) {
  const [settRes, sellerRes, ignoredRes] = await Promise.all([
    sb.from('settings').select('*').order('key'),
    sb.from('seller_master').select('*').order('seller_id'),
    sb.from('ignored_sellers').select('*').order('seller_id'),
  ]);

  const settings = settRes.data || [];
  const sellers = sellerRes.data || [];
  const ignored = ignoredRes.data || [];
  let activeTab = 'settings';

  function render() {
    el.innerHTML = `
      <h2 class="text-lg font-bold mb-4">設定</h2>
      <div class="flex gap-2 mb-4">
        <button class="btn ${activeTab==='settings'?'btn-primary':'btn-secondary'} text-xs" onclick="document.dispatchEvent(new CustomEvent('settings-tab',{detail:'settings'}))">システム設定</button>
        <button class="btn ${activeTab==='sellers'?'btn-primary':'btn-secondary'} text-xs" onclick="document.dispatchEvent(new CustomEvent('settings-tab',{detail:'sellers'}))">セラーマスター</button>
        <button class="btn ${activeTab==='ignored'?'btn-primary':'btn-secondary'} text-xs" onclick="document.dispatchEvent(new CustomEvent('settings-tab',{detail:'ignored'}))">無視セラー</button>
      </div>
      <div id="settings-content"></div>
    `;

    document.addEventListener('settings-tab', e => { activeTab = e.detail; render(); }, { once: true });

    const container = document.getElementById('settings-content');

    if (activeTab === 'settings') {
      container.innerHTML = `
        <div class="card">
          <table class="data-table">
            <thead><tr><th class="w-48">キー</th><th>値</th><th class="w-64">説明</th><th class="w-20"></th></tr></thead>
            <tbody>
              ${settings.map(s => {
                const val = typeof s.value === 'object' ? JSON.stringify(s.value) : String(s.value ?? '');
                return `<tr>
                  <td class="font-mono text-xs">${escHtml(s.key)}</td>
                  <td><input type="text" class="input w-full text-xs setting-val" data-key="${escHtml(s.key)}" value="${escHtml(val)}"></td>
                  <td class="text-xs text-gray-500">${escHtml(s.description || '')}</td>
                  <td><button class="btn btn-primary text-xs py-0.5 px-2 setting-save" data-key="${escHtml(s.key)}">保存</button></td>
                </tr>`;
              }).join('')}
            </tbody>
          </table>
        </div>
      `;

      container.querySelectorAll('.setting-save').forEach(btn => {
        btn.addEventListener('click', async () => {
          const key = btn.dataset.key;
          const input = container.querySelector(`.setting-val[data-key="${key}"]`);
          let value = input.value;
          // Try to parse as JSON
          try { value = JSON.parse(value); } catch {}
          btn.disabled = true;
          const { error } = await sb.from('settings').update({ value }).eq('key', key);
          btn.disabled = false;
          if (error) toast('保存失敗: ' + error.message, 'error');
          else {
            toast('保存しました');
            const s = settings.find(x => x.key === key);
            if (s) s.value = value;
          }
        });
      });
    }

    if (activeTab === 'sellers') {
      container.innerHTML = `
        <div class="card">
          <table class="data-table">
            <thead><tr><th>セラーID</th><th>表示名</th><th>デフォルトフラグ</th><th>メモ</th><th></th></tr></thead>
            <tbody>
              ${sellers.map(s => `<tr>
                <td class="font-mono text-xs">${escHtml(s.seller_id)}</td>
                <td><input type="text" class="input text-xs seller-field" data-id="${escHtml(s.seller_id)}" data-field="display_name" value="${escHtml(s.display_name||'')}"></td>
                <td>
                  <select class="input text-xs seller-field" data-id="${escHtml(s.seller_id)}" data-field="default_flag">
                    <option value="" ${!s.default_flag?'selected':''}>なし</option>
                    <option value="exclude" ${s.default_flag==='exclude'?'selected':''}>除外</option>
                    <option value="focus" ${s.default_flag==='focus'?'selected':''}>注目</option>
                  </select>
                </td>
                <td><input type="text" class="input text-xs seller-field" data-id="${escHtml(s.seller_id)}" data-field="memo" value="${escHtml(s.memo||'')}"></td>
                <td><button class="btn btn-primary text-xs py-0.5 px-2 seller-save" data-id="${escHtml(s.seller_id)}">保存</button></td>
              </tr>`).join('')}
            </tbody>
          </table>
        </div>
      `;

      container.querySelectorAll('.seller-save').forEach(btn => {
        btn.addEventListener('click', async () => {
          const id = btn.dataset.id;
          const fields = container.querySelectorAll(`.seller-field[data-id="${id}"]`);
          const data = {};
          fields.forEach(f => { data[f.dataset.field] = f.value || null; });
          btn.disabled = true;
          const { error } = await sb.from('seller_master').update(data).eq('seller_id', id);
          btn.disabled = false;
          if (error) toast('保存失敗: ' + error.message, 'error');
          else toast('保存しました');
        });
      });
    }

    if (activeTab === 'ignored') {
      container.innerHTML = `
        <div class="card">
          <table class="data-table">
            <thead><tr><th>セラーID</th><th>セラー名</th><th>理由</th></tr></thead>
            <tbody>
              ${ignored.map(s => `<tr>
                <td class="font-mono text-xs">${escHtml(s.seller_id)}</td>
                <td class="text-xs">${escHtml(s.seller_name)}</td>
                <td class="text-xs text-gray-500">${escHtml(s.reason)}</td>
              </tr>`).join('')}
            </tbody>
          </table>
        </div>
      `;
    }
  }

  render();
}

// ============================================================
// PAGE: LOGS
// ============================================================
async function pageLogs(el) {
  let activeTab = 'price_history';

  async function render() {
    el.innerHTML = `
      <h2 class="text-lg font-bold mb-4">ログ</h2>
      <div class="flex gap-2 mb-4">
        <button class="btn ${activeTab==='price_history'?'btn-primary':'btn-secondary'} text-xs" id="log-tab-price">価格変更履歴</button>
        <button class="btn ${activeTab==='notifications'?'btn-primary':'btn-secondary'} text-xs" id="log-tab-notif">通知ログ</button>
      </div>
      <div id="logs-content"><div class="flex justify-center py-10"><div class="loader"></div></div></div>
    `;

    document.getElementById('log-tab-price').addEventListener('click', () => { activeTab = 'price_history'; render(); });
    document.getElementById('log-tab-notif').addEventListener('click', () => { activeTab = 'notifications'; render(); });

    const container = document.getElementById('logs-content');

    if (activeTab === 'price_history') {
      const { data, error } = await sb.from('price_history').select('*').order('created_at', { ascending: false }).limit(200);
      if (error) { container.innerHTML = `<p class="text-red-600">${escHtml(error.message)}</p>`; return; }
      container.innerHTML = `
        <div class="card overflow-x-auto">
          <table class="data-table">
            <thead><tr><th>日時</th><th>SKU</th><th>旧価格</th><th>新価格</th><th>トリガー</th><th>レベル</th><th>最安競合</th><th>理由</th></tr></thead>
            <tbody>
              ${(data||[]).map(h => `<tr>
                <td class="text-xs">${fmtDate(h.created_at)}</td>
                <td class="font-mono text-xs">${escHtml(h.sku_code)}</td>
                <td class="text-right font-mono text-xs">${yen(h.old_price)}</td>
                <td class="text-right font-mono text-xs">${yen(h.new_price)}</td>
                <td><span class="badge badge-gray text-xs">${escHtml(h.trigger_type)}</span></td>
                <td><span class="badge ${LEVEL_COLORS[h.pricing_level]||'badge-gray'} text-xs">${escHtml(h.pricing_level)}</span></td>
                <td class="text-right font-mono text-xs">${yen(h.lowest_competitor_price)}</td>
                <td class="text-xs text-gray-500 max-w-[300px] truncate" title="${escHtml(h.reason)}">${escHtml(truncate(h.reason, 50))}</td>
              </tr>`).join('')}
            </tbody>
          </table>
        </div>
      `;
    }

    if (activeTab === 'notifications') {
      const { data, error } = await sb.from('notifications_log').select('*').order('sent_at', { ascending: false }).limit(200);
      if (error) { container.innerHTML = `<p class="text-red-600">${escHtml(error.message)}</p>`; return; }
      container.innerHTML = `
        <div class="card overflow-x-auto">
          <table class="data-table">
            <thead><tr><th>日時</th><th>チャネル</th><th>イベント</th><th>ペイロード</th></tr></thead>
            <tbody>
              ${(data||[]).map(n => `<tr>
                <td class="text-xs">${fmtDate(n.sent_at)}</td>
                <td><span class="badge badge-gray text-xs">${escHtml(n.channel)}</span></td>
                <td class="text-xs">${escHtml(n.event_type)}</td>
                <td class="text-xs font-mono max-w-[400px] truncate" title="${escHtml(JSON.stringify(n.payload))}">${escHtml(truncate(JSON.stringify(n.payload), 60))}</td>
              </tr>`).join('')}
            </tbody>
          </table>
        </div>
      `;
    }
  }

  render();
}

checkAuth();
sb.auth.onAuthStateChange((event, session) => {
  if (event === 'SIGNED_IN' && session) checkAuth();
  if (event === 'SIGNED_OUT') location.reload();
});
</script>
